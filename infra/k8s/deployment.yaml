apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  labels:
    app: todo-api
    team: platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: todo-api
  template:
    spec:
      containers:
      - name: todo-api
        image: todo-api:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
