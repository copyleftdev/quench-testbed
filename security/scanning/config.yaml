scanners:
  - name: dependency-check
    schedule: "0 */6 * * *"
    severity_threshold: high
  - name: sast
    schedule: "0 2 * * *"
    rules:
      - no-hardcoded-secrets
      - no-sql-injection
      - no-xss
  - name: container-scan
    schedule: "0 3 * * *"
    registries:
      - ghcr.io/copyleftdev/todo-api
