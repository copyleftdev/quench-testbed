name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend tests
        run: cd backend && cargo test
      - name: Frontend tests
        run: cd frontend && npm test
      - name: Security scan
        run: echo "scan placeholder"
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd backend && cargo clippy -- -D warnings
