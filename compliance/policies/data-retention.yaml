policy:
  name: data-retention
  version: "2.0"
  standard: SOC2-CC6.1
  rules:
    - entity: todos
      retention_days: 365
      deletion_method: soft_delete
      audit_required: true
    - entity: audit_log
      retention_days: 2555  # 7 years
      deletion_method: none
      immutable: true
    - entity: user_data
      retention_days: 90
      deletion_method: hard_delete
      gdpr_applicable: true
      right_to_erasure: true
